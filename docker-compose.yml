# Переменные: из файла .env в этой же папке или из окружения shell.
# Для продакшена скопируйте env.docker.example → .env и задайте свои DB_PASSWORD и JWT_SECRET.
# Синтаксис ${VAR:?текст} здесь не используем: иначе даже `docker compose build` падает без .env.
#
# VPS: первый старт backend (Liquibase) может занять несколько минут — healthcheck с запасом.
# Том uploads: права выставляет entrypoint образа (spring должен писать в /data/uploads).
# Если backend unhealthy: см. логи. Если меняли DB_PASSWORD при уже существующем томе pgdata —
# пароль в контейнере Postgres не обновится; либо верните старый пароль в .env, либо один раз
# docker compose down -v (удалит данные БД в Docker) и снова up.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kurashdb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_db_only_for_local}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kurashdb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-kurashdb}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme_db_only_for_local}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_SUPER_SECRET_64_CHARS_MINIMUM_CHANGE_ME_PLEASE_1234567890}
      AI_API_KEY: ${AI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      APP_STORAGE_ROOT: /data/uploads
      SERVER_PORT: "8080"
      LOG_PATH: /tmp/kurash-logs
    volumes:
      - uploads:/data/uploads
    expose:
      - "8080"
    healthcheck:
      # См. PublicHealthController — стабильнее, чем Actuator при Spring Security
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/health/live"]
      interval: 20s
      timeout: 15s
      retries: 25
      start_period: 300s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        # Ждём healthcheck backend (GET /api/health/live) — иначе nginx даёт 502, пока JVM не поднялась.
        condition: service_healthy
    ports:
      - "80:80"
    # Раскомментируйте для HTTPS на этом же хосте (нужны cert.pem / key.pem рядом с compose):
    # ports:
    #   - "443:443"
    # volumes:
    #   - ./docker/nginx/ssl:/etc/nginx/ssl:ro

volumes:
  pgdata:
  uploads:
