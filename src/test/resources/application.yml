spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: sa

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  liquibase:
    enabled: false

logging:
  level:
    root: WARN

app:
  security:
    jwt:
      secret: test-secret-should-be-long-enough-for-hmac-256-please-change-1234567890
      access-token-ttl-minutes: 60
